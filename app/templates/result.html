
{% extends "base.html" %}
{% block content %}
<div class="max-w-2xl mx-auto px-4 sm:px-6 lg:px-8 py-12">
  <div class="bg-white rounded-2xl shadow-lg p-8 md:p-12">
    <!-- Header -->
    <div class="text-center mb-10">
      <div class="inline-block bg-green-100 p-4 rounded-full mb-6">
        <i class="fas fa-check-circle text-green-600 text-3xl"></i>
      </div>
      <h2 class="text-3xl font-bold text-slate-900">Assessment Complete</h2>
    </div>

    <!-- Result Display -->
    <div class="bg-gradient-to-br from-green-50 to-emerald-50 rounded-xl p-8 md:p-12 mb-10 text-center">
      <p class="text-slate-600 text-sm font-medium uppercase tracking-wider mb-4">Result</p>
      <h1 class="text-5xl md:text-6xl font-bold text-green-600 mb-2">{{ prediction }}</h1>
      <p class="text-slate-600 text-lg">Your learning diagnostic assessment has been completed</p>
    </div>

    <!-- Action Buttons -->
    <div class="space-y-3 md:space-y-0 md:flex md:gap-4 md:justify-center">
      <a href="/dashboard" class="block text-center px-8 py-3 bg-gradient-to-r from-blue-600 to-indigo-600 text-white font-semibold rounded-lg hover:from-blue-700 hover:to-indigo-700 shadow-md hover:shadow-lg transition-all duration-200">
        <i class="fas fa-chart-line mr-2"></i>
        View Dashboard
      </a>
      <a href="/test" class="block text-center px-8 py-3 bg-slate-200 text-slate-900 font-semibold rounded-lg hover:bg-slate-300 shadow-md hover:shadow-lg transition-all duration-200">
        <i class="fas fa-redo mr-2"></i>
        Take Another Assessment
      </a>
    </div>
  </div>
</div>
{% endblock %}
