</div>

</div>

      <div id="numeracy-result" class="bg-blue-300 mt-6 hidden bg-slate-50 p-4 rounded">

      <a href="/grammar" class="block text-center px-8 py-3 bg-slate-200 text-slate-900 font-semibold rounded-lg hover:bg-slate-300 shadow-md hover:shadow-lg transition-all duration-200">
